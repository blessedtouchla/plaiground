<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PLAIGROUND • Wanna Plai?</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        .splat-bg {
            background: linear-gradient(135deg, #f97316 30%, #c026d3 70%, #3b82f6);
            position: relative;
        }
        .splat-bg::before {
            content: '';
            position: absolute;
            top: -20%;
            left: -20%;
            width: 140%;
            height: 140%;
            background: radial-gradient(circle, rgba(249,115,22,0.4) 20%, transparent 60%);
            animation: splatMove 20s infinite;
        }
        @keyframes splatMove {
            0% { transform: rotate(0deg) scale(1); }
            50% { transform: rotate(5deg) scale(1.05); }
            100% { transform: rotate(0deg) scale(1); }
        }
    </style>
</head>
<body class="bg-white">

    <!-- Navbar -->
    <nav class="border-b bg-white sticky top-0 z-50 py-5">
        <div class="max-w-6xl mx-auto px-6 flex justify-center">
            <img src="LOGO.jpeg" alt="PLAIGROUND" class="h-20 md:h-28 object-contain drop-shadow-2xl">
        </div>
    </nav>

    <!-- Hero with splatter -->
    <div class="splat-bg text-white py-16 text-center relative">
        <div class="max-w-4xl mx-auto px-6 relative z-10">
            <h1 class="text-6xl md:text-7xl font-black tracking-tighter mb-4">WANNA PLAI?</h1>
            <p class="text-3xl">Paste your lyrics.<br>Get a real song instantly.</p>
        </div>
    </div>

    <!-- Main Tool -->
    <div id="create-section" class="max-w-6xl mx-auto px-6 py-12">
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            
            <!-- Lyrics -->
            <div class="bg-white border-4 border-orange-400 rounded-3xl p-10 shadow-2xl">
                <h2 class="text-3xl font-bold mb-6">Drop Your Lyrics</h2>
                <textarea id="lyrics-input" rows="9" class="w-full border-2 border-zinc-300 rounded-2xl p-6 text-lg focus:border-purple-500" placeholder="Let it flow..."></textarea>
                <button onclick="generateSong()" class="mt-8 w-full py-6 bg-gradient-to-r from-pink-500 via-purple-600 to-blue-600 text-white text-2xl font-black rounded-3xl hover:scale-105 transition-all">
                    ✨ MAKE IT A BANGER ✨
                </button>
            </div>

            <!-- Preview -->
            <div class="bg-gradient-to-br from-pink-100 to-purple-100 border-4 border-purple-400 rounded-3xl p-10 shadow-2xl flex flex-col justify-center items-center">
                <h2 class="text-3xl font-bold mb-6">Song Preview</h2>
                <div class="w-full h-20 bg-white rounded-2xl flex items-center px-6 mb-6 shadow-inner">
                    <div class="flex-1 h-3 bg-gradient-to-r from-pink-500 via-purple-500 to-blue-500 rounded-full animate-pulse"></div>
                </div>
                <p class="text-center text-zinc-700 italic">"This shit slaps..."</p>
            </div>
        </div>

        <!-- Action Buttons -->
        <div class="mt-12 grid grid-cols-1 md:grid-cols-3 gap-4">
            <button onclick="publishSong()" class="py-7 bg-orange-600 hover:bg-orange-700 text-white rounded-3xl text-xl font-bold shadow-xl">
                🚀 Publish for $9.99/month
            </button>
            <button onclick="makeMusicVideo()" class="py-7 bg-purple-600 hover:bg-purple-700 text-white rounded-3xl text-xl font-bold">
                🎥 Make a Music Video
            </button>
            <button onclick="shareSong()" class="py-7 border-4 border-black hover:bg-black hover:text-white rounded-3xl text-xl font-bold">
                Share Your Creation
            </button>
        </div>
    </div>

    <script>
        function generateSong() {
            alert("🔥 The AI is cooking your banger right now!");
        }
        function publishSong() { alert("Publishing flow coming soon!"); }
        function makeMusicVideo() { alert("Video mode activated 🔥"); }
        function shareSong() { alert("Share options unlocked!"); }
    </script>
