<body class="bg-white">

    <!-- Navbar with your actual logo -->
    <nav class="border-b bg-white sticky top-0 z-50 py-6">
        <div class="max-w-6xl mx-auto px-6 flex justify-center">

        </div>
    </nav>

    <!-- Hero -->
    <div class="bg-gradient-to-br from-orange-500 via-purple-600 to-blue-600 text-white py-12 text-center">

            <h1 class="text-5xl md:text-6xl font-bold tracking-tighter mb-3">Wanna Plai?</h1>
            <p class="text-2xl">Paste your lyrics.<br>Get a real song instantly.</p>

    </div>

    <!-- Tool Section -->
    <div id="create-section" class="max-w-6xl mx-auto px-6 py-12">
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <div class="bg-white border-4 border-orange-400 rounded-3xl p-10 shadow-2xl">
                <h2 class="text-3xl font-bold mb-6">Drop Your Lyrics</h2>
                <textarea id="lyrics-input" rows="9" class="w-full border-2 border-zinc-300 rounded-2xl p-6 text-lg focus:border-purple-500" placeholder="Let it flow..."></textarea>
                <button onclick="generateSong()" class="mt-8 w-full py-6 bg-gradient-to-r from-pink-500 via-purple-600 to-blue-600 text-white text-2xl font-black rounded-3xl hover:scale-105 transition-all">
                    ✨ MAKE IT A BANGER ✨
                </button>
            </div>

            <div class="bg-gradient-to-br from-pink-100 to-purple-100 border-4 border-purple-400 rounded-3xl p-10 shadow-2xl flex flex-col justify-center items-center">
                <h2 class="text-3xl font-bold mb-6">Song Preview</h2>
                <div class="w-full h-20 bg-white rounded-2xl flex items-center px-6 mb-6 shadow-inner">
                    <div class="flex-1 h-3 bg-gradient-to-r from-pink-500 via-purple-500 to-blue-500 rounded-full animate-pulse"></div>
                </div>
                <p class="text-center text-zinc-700 italic">"This shit slaps..."</p>
            </div>
        </div>
    </div>

    <script>
        function generateSong() {
            alert("🔥 AI cooking your banger right now!");
        }
    </script>
</body>
